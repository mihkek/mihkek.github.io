<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Distributor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
            background: #f5f5f5;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        .input-group {
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #2481cc;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .category {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            padding: 8px;
            background: white;
            border-radius: 6px;
        }
        .result-section {
            margin-top: 20px;
            display: none;
        }
        .category-config {
            background: white;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            position: relative;
        }
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .category-name {
            font-weight: bold;
            font-size: 14px;
            flex: 1;
        }
        .category-actions {
            display: flex;
            gap: 8px;
        }
        .category-action {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            border-radius: 4px;
            width: auto;
        }
        .category-action.edit {
            color: #2481cc;
        }
        .category-action.delete {
            color: #ff4444;
        }
        .inputs {
            display: flex;
            gap: 12px;
        }
        .input-with-label {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .input-with-label label {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
            font-weight: 500;
        }
        .inputs input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }
        .balance-positive {
            border-left: 4px solid #4CAF50;
        }
        .balance-negative {
            border-left: 4px solid #f44336;
        }
        .summary .category {
            background: #e8f5e8;
            border-left: 4px solid #4CAF50;
        }
        .reset-button {
            background: #ff4444;
            margin-top: 10px;
        }
        .bonus-section {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border: 1px solid #e0e0e0;
        }
        .bonus-result {
            margin-top: 10px;
            padding: 10px;
            background: #fff3cd;
            border-radius: 6px;
            border: 1px solid #ffeaa7;
        }
        .summary.over-distributed {
            border: 2px solid #f44336;
            border-radius: 8px;
            background: #ffebee;
        }
        .add-category-btn {
            background: #28a745;
            margin-top: 10px;
        }
        .save-report-button {
            background: #673ab7;
            margin-top: 10px;
        }
        .edit-category-input {
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            width: 100%;
        }
        .import-export-section {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border: 1px solid #e0e0e0;
        }
        .import-export-section h3 {
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
        }
        .export-button {
            background: #17a2b8;
        }
        .import-button {
            background: #6c757d;
        }
        .import-textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: monospace;
            box-sizing: border-box;
            margin-bottom: 10px;
            resize: vertical;
        }
        .import-actions {
            display: flex;
            gap: 10px;
        }
        .import-actions button {
            flex: 1;
            margin-bottom: 0;
        }
        .cancel-import {
            background: #6c757d;
        }
        .confirm-import {
            background: #28a745;
        }
        .bonus-categories-config {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
            border: 1px solid #e9ecef;
        }
        .total-percentage {
            text-align: center;
            margin-top: 10px;
            padding: 8px;
            border-radius: 6px;
            font-weight: bold;
        }
        .total-percentage.normal {
            background: #e8f5e8;
            color: #2e7d32;
        }
        .total-percentage.warning {
            background: #ffebee;
            color: #c62828;
        }
        .add-income-section {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border: 1px solid #e0e0e0;
        }
        .add-income-section h3 {
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
        }
        .add-income-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .add-income-input {
            flex: 2;
        }
        .total-income-display {
            flex: 1;
            background: #e8f5e8;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            border: 1px solid #4CAF50;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .copy-total-button {
            flex: 0.5;
            padding: 12px 8px;
            background: #17a2b8;
            margin-bottom: 0;
            white-space: nowrap;
            font-size: 14px;
        }
        .free-distribution-section {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border: 1px solid #e0e0e0;
        }
        .free-distribution-section h3 {
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
        }
        .free-distribution-config {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
            border: 1px solid #e9ecef;
        }
        .free-category-item {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }
        .free-category-name {
            flex: 2;
            font-weight: 500;
        }
        .free-category-percent {
            flex: 1;
        }
        .free-category-percent input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 100%;
        }
        .free-category-remove {
            flex: 0.5;
            color: #ff4444;
            cursor: pointer;
            text-align: center;
            font-size: 20px;
            background: none;
            border: none;
            padding: 0;
            margin: 0;
            width: auto;
        }
        .add-free-category-btn {
            background: #6f42c1;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>💰 Распределение доходов</h2>
        
        <!-- Новая секция для добавления к доходу -->
        <div class="add-income-section">
            <h3>➕ Добавить к доходу</h3>
            <div class="add-income-row">
                <div class="add-income-input">
                    <input type="number" id="addIncome" placeholder="Сумма для добавления">
                </div>
                <div class="total-income-display" id="totalIncomePreview">0 ₽</div>
                <button class="copy-total-button" onclick="copyTotalIncome()" title="Копировать общую сумму">📋</button>
            </div>
            <small style="color: #666;">Введите сумму для добавления к текущему доходу</small>
        </div>
        
        <div class="input-group">
            <label>Общая сумма дохода:</label>
            <input type="number" id="totalIncome" placeholder="Введите сумму" required oninvalid="this.setCustomValidity('Пожалуйста, введите сумму дохода')" oninput="this.setCustomValidity('')">
        </div>

        <h3>Базовые категории:</h3>
        <div id="categoriesConfig">
            <!-- Категории будут генерироваться здесь -->
        </div>

        <button onclick="addNewCategory()" class="add-category-btn">➕ Добавить категорию</button>
        
        <button onclick="calculate()">Рассчитать</button>
        
        <!-- Новая секция для распределения свободных средств -->
        <div class="free-distribution-section">
            <h3>🔄 Распределение свободных средств</h3>
            <div class="free-distribution-config">
                <div id="freeCategoriesConfig">
                    <!-- Категории свободных средств будут генерироваться здесь -->
                </div>
                <div id="freeTotalPercentageDisplay" class="total-percentage normal">
                    <!-- Общая сумма процентов будет здесь -->
                </div>
                <button onclick="addNewFreeCategory()" class="add-free-category-btn">➕ Добавить категорию</button>
            </div>
        </div>
        
        <!-- Секция для допов (премий) -->
        <div class="bonus-section">
            <h3>🎁 Допы (премии)</h3>
            
            <div class="bonus-categories-config">
                <h4>Категории премии:</h4>
                <div id="bonusCategoriesConfig">
                    <!-- Категории премий будут генерироваться здесь -->
                </div>
                <div id="totalPercentageDisplay" class="total-percentage normal">
                    <!-- Общая сумма процентов будет здесь -->
                </div>
                <button onclick="addNewBonusCategory()" style="background: #6f42c1; margin-top: 10px;">➕ Добавить категорию премии</button>
            </div>
            
            <div class="input-group">
                <label>Сумма премии:</label>
                <input type="number" id="bonusAmount" placeholder="Введите сумму премии" required oninvalid="this.setCustomValidity('Пожалуйста, введите сумму премии')" oninput="this.setCustomValidity('')">
            </div>
            <button onclick="calculateBonus()" style="background: #28a745;">Рассчитать премию</button>
            <div id="bonusResult" class="bonus-result" style="display: none;">
                <h4>Распределение премии:</h4>
                <div id="bonusDistribution"></div>
            </div>
        </div>
        
        <button onclick="resetData()" class="reset-button">🔄 Сбросить числовые данные</button>
        <button onclick="saveReport()" class="save-report-button">💾 Сохранить отчет</button>
        
        <!-- Новая секция для экспорта/импорта -->
        <div class="import-export-section">
            <h3>📤 Экспорт / 📥 Импорт</h3>
            <button onclick="exportData()" class="export-button">📤 Экспорт данных</button>
            <button onclick="showImportDialog()" class="import-button">📥 Импорт данных</button>
            
            <div id="importDialog" style="display: none; margin-top: 15px;">
                <textarea id="importData" class="import-textarea" placeholder="Вставьте сюда данные для импорта..."></textarea>
                <div class="import-actions">
                    <button onclick="hideImportDialog()" class="cancel-import">❌ Отмена</button>
                    <button onclick="importData()" class="confirm-import">✅ Импорт</button>
                </div>
            </div>
        </div>
        
        <div id="distributionResult" class="result-section">
            <h3>Результат распределения:</h3>
            <div id="categoriesList"></div>
        </div>
    </div>

    <script>
        // Инициализация Telegram Web App
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        Telegram.WebApp.enableClosingConfirmation();
        Telegram.WebApp.setHeaderColor('#2481cc');
        Telegram.WebApp.setBackgroundColor('#f5f5f5');

        // Базовая конфигурация (spent = 0 изначально)
        const defaultConfig = {
            categories: [
                { id: 'house', name: '🏠 Дом', limit: 10000, spent: 0 },
                { id: 'car', name: '🚗 Машина', limit: 38000, spent: 0 },
                { id: 'longTerm', name: '📈 Долгосрок', limit: 45000, spent: 0 },
                { id: 'start', name: '🚀 Старт', limit: 10000, spent: 0 },
                { id: 'oper', name: '💼 Опер', limit: 45000, spent: 0 },
                { id: 'wife', name: '👩 Жена', limit: 42000, spent: 0 },
                { id: 'free', name: '💎 Свободно', limit: 40000, spent: 0 },
                { id: 'hata', name: '🏡 ХАТА', limit: 20000, spent: 0 },
                { id: 'home', name: '🏠 Домой', limit: 10000, spent: 0 }
            ],
            bonusCategories: [
                { id: 'bonus_oper', name: '💼 Оперрезерв', percentage: 25 },
                { id: 'bonus_longTerm', name: '📈 Долгосрок', percentage: 25 },
                { id: 'bonus_car', name: '🚗 Машина', percentage: 25 },
                { id: 'bonus_free', name: '💎 Свободные', percentage: 25 }
            ],
            freeCategories: [
                { id: 'free_car', name: '🚗 Машина', percentage: 33 },
                { id: 'free_invest', name: '📈 Инвестиции', percentage: 33 },
                { id: 'free_free', name: '💎 Свободные', percentage: 34 }
            ],
            extraReserve: 0
        };

        let config = JSON.parse(JSON.stringify(defaultConfig));

        // Надежное сохранение данных
        function saveToStorage() {
            const data = {
                categories: config.categories,
                bonusCategories: config.bonusCategories,
                freeCategories: config.freeCategories,
                lastIncome: document.getElementById('totalIncome').value,
                bonusAmount: document.getElementById('bonusAmount').value,
                timestamp: new Date().toISOString(),
                version: '1.7'
            };
            
            try {
                data.categories.forEach((category) => {
                    Telegram.WebApp.CloudStorage.setItem(`cat_${category.id}`, JSON.stringify(category));
                });
                Telegram.WebApp.CloudStorage.setItem('finance_config', JSON.stringify(data));
            } catch (e) {}
            
            try {
                localStorage.setItem('finance_data', JSON.stringify(data));
            } catch (e) {}
        }

        // Загрузка данных
        function loadFromStorage() {
            let loadedData = null;
            
            try {
                const localData = localStorage.getItem('finance_data');
                if (localData) {
                    loadedData = JSON.parse(localData);
                    applyLoadedData(loadedData);
                    return;
                }
            } catch (e) {}
            
            console.log('No saved data found, using defaults');
        }

        function applyLoadedData(data) {
            if (data && data.categories) {
                config.categories = data.categories.map(savedCat => {
                    return {
                        id: savedCat.id,
                        name: savedCat.name,
                        limit: savedCat.limit || 0,
                        spent: savedCat.spent || 0
                    };
                });
                renderCategories();
            }
            
            if (data && data.bonusCategories) {
                config.bonusCategories = data.bonusCategories.map(savedCat => {
                    return {
                        id: savedCat.id,
                        name: savedCat.name,
                        percentage: savedCat.percentage || 0
                    };
                });
                renderBonusCategories();
            }
            
            if (data && data.freeCategories) {
                config.freeCategories = data.freeCategories.map(savedCat => {
                    return {
                        id: savedCat.id,
                        name: savedCat.name,
                        percentage: savedCat.percentage || 0
                    };
                });
                renderFreeCategories();
            }
            
            if (data && data.lastIncome) {
                document.getElementById('totalIncome').value = data.lastIncome;
            }
            if (data && data.bonusAmount) {
                document.getElementById('bonusAmount').value = data.bonusAmount;
            }
            
            updateTotalIncomePreview();
        }

        // Функция сброса данных (только числа)
        function resetData() {
            if (confirm('Вы уверены, что хотите сбросить все числовые данные? Набор категорий останется прежним.')) {
                // Сбрасываем только spent и значения полей ввода
                config.categories.forEach(category => {
                    category.spent = 0;
                });
                
                document.getElementById('totalIncome').value = '';
                document.getElementById('bonusAmount').value = '';
                document.getElementById('addIncome').value = '';
                document.getElementById('bonusResult').style.display = 'none';
                document.getElementById('distributionResult').style.display = 'none';
                
                renderCategories();
                saveToStorage();
                updateTotalIncomePreview();
                
                Telegram.WebApp.showAlert('Числовые данные сброшены');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // Функция обновления предварительного просмотра общей суммы
        function updateTotalIncomePreview() {
            const currentIncome = parseInt(document.getElementById('totalIncome').value) || 0;
            const addAmount = parseInt(document.getElementById('addIncome').value) || 0;
            const total = currentIncome + addAmount;
            document.getElementById('totalIncomePreview').textContent = formatMoney(total);
        }

        // Функция копирования общей суммы
        function copyTotalIncome() {
            const total = parseInt(document.getElementById('totalIncomePreview').textContent.replace(/[^\d]/g, '')) || 0;
            if (total > 0) {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(total.toString()).then(() => {
                        Telegram.WebApp.showAlert(`✅ Сумма ${formatMoney(total)} скопирована!`);
                    }).catch(() => {
                        fallbackCopy(total.toString());
                    });
                } else {
                    fallbackCopy(total.toString());
                }
            } else {
                alert('Нет суммы для копирования');
            }
        }

        // Добавление новой категории
        function addNewCategory() {
            const newId = 'category_' + Date.now();
            const newCategory = {
                id: newId,
                name: '🆕 Новая категория',
                limit: 10000,
                spent: 0
            };
            config.categories.push(newCategory);
            renderCategories();
            saveToStorage();
        }

        // Добавление новой категории премии
        function addNewBonusCategory() {
            const newId = 'bonus_category_' + Date.now();
            const newCategory = {
                id: newId,
                name: '🆕 Новая категория',
                percentage: 25
            };
            config.bonusCategories.push(newCategory);
            renderBonusCategories();
            saveToStorage();
        }

        // Добавление новой категории свободных средств
        function addNewFreeCategory() {
            const newId = 'free_category_' + Date.now();
            const newCategory = {
                id: newId,
                name: '🆕 Новая категория',
                percentage: 20
            };
            config.freeCategories.push(newCategory);
            renderFreeCategories();
            saveToStorage();
        }

        // Удаление категории
        function deleteCategory(categoryId) {
            if (confirm('Вы уверены, что хотите удалить эту категорию?')) {
                config.categories = config.categories.filter(cat => cat.id !== categoryId);
                renderCategories();
                saveToStorage();
            }
        }

        // Удаление категории премии
        function deleteBonusCategory(categoryId) {
            if (confirm('Вы уверены, что хотите удалить эту категорию премии?')) {
                config.bonusCategories = config.bonusCategories.filter(cat => cat.id !== categoryId);
                renderBonusCategories();
                saveToStorage();
            }
        }

        // Удаление категории свободных средств
        function deleteFreeCategory(categoryId) {
            if (confirm('Вы уверены, что хотите удалить эту категорию?')) {
                config.freeCategories = config.freeCategories.filter(cat => cat.id !== categoryId);
                renderFreeCategories();
                saveToStorage();
            }
        }

        // Редактирование названия категории
        function editCategoryName(categoryId) {
            const category = config.categories.find(cat => cat.id === categoryId);
            if (!category) return;

            const newName = prompt('Введите новое название категории (можно со смайликом):', category.name);
            if (newName && newName.trim() !== '') {
                category.name = newName.trim();
                renderCategories();
                saveToStorage();
            }
        }

        // Редактирование названия категории премии
        function editBonusCategoryName(categoryId) {
            const category = config.bonusCategories.find(cat => cat.id === categoryId);
            if (!category) return;

            const newName = prompt('Введите новое название категории премии (можно со смайликом):', category.name);
            if (newName && newName.trim() !== '') {
                category.name = newName.trim();
                renderBonusCategories();
                saveToStorage();
            }
        }

        // Редактирование названия категории свободных средств
        function editFreeCategoryName(categoryId) {
            const category = config.freeCategories.find(cat => cat.id === categoryId);
            if (!category) return;

            const newName = prompt('Введите новое название категории (можно со смайликом):', category.name);
            if (newName && newName.trim() !== '') {
                category.name = newName.trim();
                renderFreeCategories();
                saveToStorage();
            }
        }

        // Показываем категории для редактирования
        function renderCategories() {
            const container = document.getElementById('categoriesConfig');
            let html = '';
            
            config.categories.forEach((category) => {
                html += `
                    <div class="category-config">
                        <div class="category-header">
                            <div class="category-name">${category.name}</div>
                            <div class="category-actions">
                                <button class="category-action edit" onclick="editCategoryName('${category.id}')" title="Редактировать название">✏️</button>
                                <button class="category-action delete" onclick="deleteCategory('${category.id}')" title="Удалить категорию">❌</button>
                            </div>
                        </div>
                        <div class="inputs">
                            <div class="input-with-label">
                                <label>Лимит</label>
                                <input type="number" 
                                       id="limit_${category.id}" 
                                       value="${category.limit}" 
                                       placeholder="Лимит"
                                       onchange="updateCategory('${category.id}')"
                                       required>
                            </div>
                            <div class="input-with-label">
                                <label>Потрачено</label>
                                <input type="number" 
                                       id="spent_${category.id}" 
                                       value="${category.spent}" 
                                       placeholder="Потрачено"
                                       onchange="updateCategory('${category.id}')"
                                       required>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // Показываем категории премий для редактирования
        function renderBonusCategories() {
            const container = document.getElementById('bonusCategoriesConfig');
            let html = '';
            
            config.bonusCategories.forEach((category) => {
                html += `
                    <div class="category-config">
                        <div class="category-header">
                            <div class="category-name">${category.name}</div>
                            <div class="category-actions">
                                <button class="category-action edit" onclick="editBonusCategoryName('${category.id}')" title="Редактировать название">✏️</button>
                                <button class="category-action delete" onclick="deleteBonusCategory('${category.id}')" title="Удалить категорию">❌</button>
                            </div>
                        </div>
                        <div class="inputs">
                            <div class="input-with-label">
                                <label>Процент (%)</label>
                                <input type="number" 
                                       id="percentage_${category.id}" 
                                       value="${category.percentage}" 
                                       placeholder="Процент"
                                       min="0"
                                       max="100"
                                       onchange="updateBonusCategory('${category.id}')"
                                       required>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            updateTotalPercentageDisplay();
        }

        // Показываем категории свободных средств для редактирования
        function renderFreeCategories() {
            const container = document.getElementById('freeCategoriesConfig');
            let html = '';
            
            config.freeCategories.forEach((category) => {
                html += `
                    <div class="free-category-item">
                        <div class="free-category-name">
                            <button class="category-action edit" onclick="editFreeCategoryName('${category.id}')" title="Редактировать название" style="font-size: 14px; background: none; border: none; color: #2481cc; cursor: pointer; padding: 0; margin-right: 5px;">✏️</button>
                            ${category.name}
                        </div>
                        <div class="free-category-percent">
                            <input type="number" 
                                   id="free_percentage_${category.id}" 
                                   value="${category.percentage}" 
                                   placeholder="%"
                                   min="0"
                                   max="100"
                                   onchange="updateFreeCategory('${category.id}')"
                                   required>
                        </div>
                        <button class="free-category-remove" onclick="deleteFreeCategory('${category.id}')" title="Удалить категорию">❌</button>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            updateFreeTotalPercentageDisplay();
        }

        // Обновляем отображение общей суммы процентов для премий
        function updateTotalPercentageDisplay() {
            const totalPercentage = config.bonusCategories.reduce((sum, cat) => sum + cat.percentage, 0);
            const displayElement = document.getElementById('totalPercentageDisplay');
            
            if (totalPercentage > 100) {
                displayElement.className = 'total-percentage warning';
                displayElement.innerHTML = `⚠️ Общая сумма: ${totalPercentage}% (превышает 100%)`;
            } else {
                displayElement.className = 'total-percentage normal';
                displayElement.innerHTML = `Общая сумма: ${totalPercentage}%`;
            }
        }

        // Обновляем отображение общей суммы процентов для свободных средств
        function updateFreeTotalPercentageDisplay() {
            const totalPercentage = config.freeCategories.reduce((sum, cat) => sum + cat.percentage, 0);
            const displayElement = document.getElementById('freeTotalPercentageDisplay');
            
            if (Math.abs(totalPercentage - 100) > 0.01) {
                displayElement.className = 'total-percentage warning';
                displayElement.innerHTML = `⚠️ Общая сумма: ${totalPercentage}% (должно быть 100%)`;
            } else {
                displayElement.className = 'total-percentage normal';
                displayElement.innerHTML = `Общая сумма: ${totalPercentage}%`;
            }
        }

        // Обновляем конфигурацию при изменении полей
        function updateCategory(categoryId) {
            const category = config.categories.find(cat => cat.id === categoryId);
            if (category) {
                category.limit = parseInt(document.getElementById(`limit_${categoryId}`).value) || 0;
                category.spent = parseInt(document.getElementById(`spent_${categoryId}`).value) || 0;
                saveToStorage();
            }
        }

        // Обновляем конфигурацию категории премии
        function updateBonusCategory(categoryId) {
            const category = config.bonusCategories.find(cat => cat.id === categoryId);
            if (category) {
                category.percentage = parseInt(document.getElementById(`percentage_${categoryId}`).value) || 0;
                saveToStorage();
                updateTotalPercentageDisplay();
            }
        }

        // Обновляем конфигурацию категории свободных средств
        function updateFreeCategory(categoryId) {
            const category = config.freeCategories.find(cat => cat.id === categoryId);
            if (category) {
                category.percentage = parseInt(document.getElementById(`free_percentage_${categoryId}`).value) || 0;
                saveToStorage();
                updateFreeTotalPercentageDisplay();
            }
        }

        // Сохраняем при изменении полей
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('bonusAmount').addEventListener('input', saveToStorage);
            document.getElementById('totalIncome').addEventListener('input', function() {
                saveToStorage();
                updateTotalIncomePreview();
            });
            document.getElementById('addIncome').addEventListener('input', updateTotalIncomePreview);
        });

        // Функция сохранения отчета
        function saveReport() {
            const totalIncome = parseInt(document.getElementById('totalIncome').value) || 0;
            const bonusAmount = parseInt(document.getElementById('bonusAmount').value) || 0;
            
            if (!totalIncome) {
                alert('Сначала введите сумму дохода и выполните расчет');
                return;
            }

            // Рассчитываем данные
            const categoriesWithBalance = config.categories.map(category => {
                const balance = category.limit - category.spent;
                const toSave = Math.max(0, balance);
                return {
                    ...category,
                    balance: balance,
                    toSave: toSave
                };
            });

            const totalAlreadySpent = config.categories.reduce((sum, cat) => sum + cat.spent, 0);
            const totalToSave = categoriesWithBalance.reduce((sum, cat) => sum + cat.toSave, 0);
            const remainingAfterBasics = (totalIncome - totalAlreadySpent - totalToSave) + config.extraReserve;
            const remainingAfterSpent = totalIncome - totalAlreadySpent;

            // Формируем текст для копирования
            let text = `💰 РАСПРЕДЕЛЕНИЕ ФИНАНСОВ\n`;
            text += `📅 ${new Date().toLocaleDateString('ru-RU')}\n\n`;
            
            text += `ОСНОВНЫЕ ПОКАЗАТЕЛИ:\n`;
            text += `• Общий доход: ${formatMoney(totalIncome)}\n`;
            text += `• Уже потрачено: ${formatMoney(totalAlreadySpent)}\n`;
            text += `• Остаток с учетом потраченного: ${formatMoney(remainingAfterSpent)}\n`;
            text += `• К доплате: ${formatMoney(totalToSave)}\n`;
            text += `• Свободный остаток: ${formatMoney(remainingAfterBasics)}\n\n`;
            
            text += `КАТЕГОРИИ:\n`;
            categoriesWithBalance.forEach(cat => {
                const balance = cat.limit - cat.spent;
                const status = balance >= 0 ? '✅' : '❌';
                const toSaveDisplay = balance >= 0 ? 
                    `+${formatMoney(cat.toSave)}` : 
                    `-${formatMoney(Math.abs(balance))}`;
                
                text += `• ${cat.name}: ${formatMoney(cat.limit)} / ${formatMoney(cat.spent)} (${status} ${toSaveDisplay})\n`;
            });
            
            text += `\n`;
            
            if (remainingAfterBasics > 0) {
                const totalFreePercentage = config.freeCategories.reduce((sum, cat) => sum + cat.percentage, 0);
                text += `РАСПРЕДЕЛЕНИЕ СВОБОДНЫХ СРЕДСТВ (${formatMoney(remainingAfterBasics)}):\n`;
                config.freeCategories.forEach(cat => {
                    const amount = (remainingAfterBasics * cat.percentage) / totalFreePercentage;
                    text += `• ${cat.name} (${cat.percentage}%): ${formatMoney(amount)}\n`;
                });
                text += `\n`;
            }
            
            if (bonusAmount > 0) {
                const totalPercentage = config.bonusCategories.reduce((sum, cat) => sum + cat.percentage, 0);
                text += `ПРЕМИЯ:\n`;
                text += `• Сумма премии: ${formatMoney(bonusAmount)}\n`;
                
                config.bonusCategories.forEach(cat => {
                    const amount = (bonusAmount * cat.percentage) / totalPercentage;
                    text += `• ${cat.name} (${cat.percentage}%): ${formatMoney(amount)}\n`;
                });
                text += `\n`;
            }
            
            // Проверяем перераспределение
            if (totalAlreadySpent > totalIncome) {
                const overAmount = totalAlreadySpent - totalIncome;
                text += `⚠️ ВНИМАНИЕ: Распределено сверх общей суммы: ${formatMoney(overAmount)}\n\n`;
            }
            
            text += `Создано в Finance Distributor`;

            // Копируем в буфер обмена
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    Telegram.WebApp.showAlert('✅ Отчет сохранен в буфер обмена!\n\nТеперь вы можете вставить его в любое приложение.');
                }).catch(() => {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        }

        // Fallback метод копирования
        function fallbackCopy(text) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                Telegram.WebApp.showAlert('✅ Отчет сохранен в буфер обмена!\n\nТеперь вы можете вставить его в любое приложение.');
            } catch (err) {
                Telegram.WebApp.showAlert('❌ Не удалось скопировать автоматически');
                prompt('Скопируйте этот текст:', text);
            }
            document.body.removeChild(textArea);
        }

        // НОВЫЕ ФУНКЦИИ ЭКСПОРТА/ИМПОРТА

        // Экспорт данных в зашифрованном формате
        function exportData() {
            const exportData = {
                categories: config.categories,
                bonusCategories: config.bonusCategories,
                freeCategories: config.freeCategories,
                lastIncome: document.getElementById('totalIncome').value || '',
                bonusAmount: document.getElementById('bonusAmount').value || '',
                timestamp: new Date().toISOString(),
                version: '1.7'
            };

            // Кодируем данные в base64 для компактности
            const jsonString = JSON.stringify(exportData);
            const encodedData = btoa(unescape(encodeURIComponent(jsonString)));
            
            // Формируем специальный формат с префиксом для идентификации
            const exportText = `FINANCE_EXPORT_v1.7|${encodedData}`;

            // Копируем в буфер обмена
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(exportText).then(() => {
                    Telegram.WebApp.showAlert('✅ Данные экспортированы в буфер обмена!\n\nТеперь вы можете вставить их на другом устройстве.');
                }).catch(() => {
                    fallbackCopyExport(exportText);
                });
            } else {
                fallbackCopyExport(exportText);
            }
        }

        function fallbackCopyExport(text) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                Telegram.WebApp.showAlert('✅ Данные экспортированы в буфер обмена!\n\nТеперь вы можете вставить их на другом устройстве.');
            } catch (err) {
                Telegram.WebApp.showAlert('❌ Не удалось скопировать автоматически');
                prompt('Скопируйте этот текст для экспорта:', text);
            }
            document.body.removeChild(textArea);
        }

        // Показать диалог импорта
        function showImportDialog() {
            document.getElementById('importDialog').style.display = 'block';
            document.getElementById('importData').value = '';
            document.getElementById('importData').focus();
        }

        // Скрыть диалог импорта
        function hideImportDialog() {
            document.getElementById('importDialog').style.display = 'none';
        }

        // Импорт данных
        function importData() {
            const importText = document.getElementById('importData').value.trim();
            
            if (!importText) {
                Telegram.WebApp.showAlert('❌ Введите данные для импорта');
                return;
            }

            try {
                // Проверяем формат данных
                if (!importText.startsWith('FINANCE_EXPORT_')) {
                    Telegram.WebApp.showAlert('❌ Неверный формат данных для импорта');
                    return;
                }

                // Извлекаем закодированные данные
                const parts = importText.split('|');
                if (parts.length !== 2) {
                    Telegram.WebApp.showAlert('❌ Неверный формат данных');
                    return;
                }

                // Декодируем данные из base64
                const decodedData = decodeURIComponent(escape(atob(parts[1])));
                const importedData = JSON.parse(decodedData);

                // Проверяем версию и структуру данных
                if (!importedData.categories || !Array.isArray(importedData.categories)) {
                    Telegram.WebApp.showAlert('❌ Неверная структура данных');
                    return;
                }

                // Подтверждение импорта
                if (confirm(`Импортировать данные?\n\nКатегорий: ${importedData.categories.length}\nКатегорий премии: ${importedData.bonusCategories ? importedData.bonusCategories.length : 'не указано'}\nДоход: ${importedData.lastIncome || 'не указан'}\nПремия: ${importedData.bonusAmount || 'не указан'}\n\nТекущие данные будут перезаписаны.`)) {
                    // Применяем импортированные данные
                    config.categories = importedData.categories;
                    
                    if (importedData.bonusCategories) {
                        config.bonusCategories = importedData.bonusCategories;
                    }
                    
                    if (importedData.freeCategories) {
                        config.freeCategories = importedData.freeCategories;
                    }
                    
                    if (importedData.lastIncome) {
                        document.getElementById('totalIncome').value = importedData.lastIncome;
                    }
                    
                    if (importedData.bonusAmount) {
                        document.getElementById('bonusAmount').value = importedData.bonusAmount;
                    }

                    // Обновляем интерфейс и сохраняем
                    renderCategories();
                    renderBonusCategories();
                    renderFreeCategories();
                    saveToStorage();
                    hideImportDialog();
                    
                    Telegram.WebApp.showAlert('✅ Данные успешно импортированы!');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }

            } catch (error) {
                console.error('Import error:', error);
                Telegram.WebApp.showAlert('❌ Ошибка при импорте данных. Проверьте правильность формата.');
            }
        }

        function calculate() {
            const totalIncome = parseInt(document.getElementById('totalIncome').value);
            if (!totalIncome || totalIncome <= 0) {
                alert('Введите корректную сумму дохода');
                return;
            }

            const categoriesWithBalance = config.categories.map(category => {
                const balance = category.limit - category.spent;
                const toSave = Math.max(0, balance);
                return {
                    ...category,
                    balance: balance,
                    toSave: toSave
                };
            });

            const totalAlreadySpent = config.categories.reduce((sum, cat) => sum + cat.spent, 0);
            const totalToSave = categoriesWithBalance.reduce((sum, cat) => sum + cat.toSave, 0);
            const remainingAfterBasics = (totalIncome - totalAlreadySpent - totalToSave) + config.extraReserve;
            const remainingAfterSpent = totalIncome - totalAlreadySpent;

            saveToStorage();
            displayResults(categoriesWithBalance, totalIncome, totalAlreadySpent, totalToSave, remainingAfterBasics, remainingAfterSpent);
        }

        function calculateBonus() {
            const bonusAmount = parseInt(document.getElementById('bonusAmount').value);
            if (!bonusAmount || bonusAmount <= 0) {
                alert('Введите корректную сумму премии');
                return;
            }

            saveToStorage();
            
            const totalPercentage = config.bonusCategories.reduce((sum, cat) => sum + cat.percentage, 0);
            const bonusResult = document.getElementById('bonusResult');
            const bonusDistribution = document.getElementById('bonusDistribution');
            
            let distributionHtml = '';
            
            config.bonusCategories.forEach((cat, index) => {
                const amount = (bonusAmount * cat.percentage) / totalPercentage;
                distributionHtml += `
                    <div class="category"><span>${cat.name} (${cat.percentage}%):</span><span>${formatMoney(amount)}</span></div>
                `;
            });
            
            distributionHtml += `
                <div class="category" style="background: #e8f5e8;">
                    <span><strong>Всего премии:</strong></span>
                    <span><strong>${formatMoney(bonusAmount)}</strong></span>
                </div>
            `;
            
            bonusResult.style.display = 'block';
            bonusDistribution.innerHTML = distributionHtml;
            
            bonusResult.scrollIntoView({ behavior: 'smooth', block: 'start' });
            Telegram.WebApp.showAlert(`Премия распределена по ${config.bonusCategories.length} категориям!`);
        }

        function displayResults(categories, totalIncome, totalAlreadySpent, totalToSave, remainingAfterBasics, remainingAfterSpent) {
            const resultDiv = document.getElementById('distributionResult');
            const categoriesList = document.getElementById('categoriesList');
            
            resultDiv.style.display = 'block';

            const isOverDistributed = totalAlreadySpent > totalIncome;
            const overAmount = isOverDistributed ? totalAlreadySpent - totalIncome : 0;
            
            let warningHtml = '';
            if (isOverDistributed) {
                warningHtml = `
                    <div style="color: #d32f2f; background: #ffebee; padding: 10px; border-radius: 6px; border: 1px solid #ffcdd2; margin-bottom: 15px; font-size: 14px;">
                        ⚠️ Распределено сверх общей суммы: ${formatMoney(overAmount)}
                    </div>
                `;
            }

            let html = warningHtml +  `
                <div class="summary ${isOverDistributed ? 'over-distributed' : ''}">
                    <div class="category"><span>💰 Общий доход:</span><span>${formatMoney(totalIncome)}</span></div>
                    <div class="category"><span>💸 Уже потрачено:</span><span>${formatMoney(totalAlreadySpent)}</span></div>
                    <div class="category"><span>📊 Остаток с учетом потраченного:</span><span>${formatMoney(remainingAfterSpent)}</span></div>
                    <div class="category"><span>📥 Нужно доложить до лимитов:</span><span>${formatMoney(totalToSave)}</span></div>
                    <div class="category"><span>🎯 Свободный остаток:</span><span>${formatMoney(remainingAfterBasics)}</span></div>
                </div>
                
                <h4>Базовые категории (Лимит / Потрачено / К отложить):</h4>
            `;
            
            categories.forEach(cat => {
                const balance = cat.limit - cat.spent;
                const status = balance >= 0 ? '✅' : '❌';
                const balanceClass = balance >= 0 ? 'balance-positive' : 'balance-negative';
                const toSaveDisplay = balance >= 0 ? 
                    formatMoney(cat.toSave) : 
                    `<span style="color: #d32f2f;">- ${formatMoney(Math.abs(balance))}</span>`;
                
                html += `
                    <div class="category ${balanceClass}">
                        <span>${cat.name}: ${formatMoney(cat.limit)} / ${formatMoney(cat.spent)}</span>
                        <span>${status} ${toSaveDisplay}</span>
                    </div>
                `;
            });
            
            if (remainingAfterBasics > 0) {
                const totalFreePercentage = config.freeCategories.reduce((sum, cat) => sum + cat.percentage, 0);
                html += `<h4>Распределение свободных средств (${formatMoney(remainingAfterBasics)}):</h4>`;
                
                config.freeCategories.forEach(cat => {
                    const amount = (remainingAfterBasics * cat.percentage) / totalFreePercentage;
                    html += `
                        <div class="category">
                            <span>${cat.name} (${cat.percentage}%):</span>
                            <span>${formatMoney(amount)}</span>
                        </div>
                    `;
                });
            }
            
            categoriesList.innerHTML = html;
            Telegram.WebApp.showAlert(`Расчет завершен! Свободных средств: ${formatMoney(remainingAfterBasics)}`);
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function formatMoney(amount) {
            return new Intl.NumberFormat('ru-RU').format(Math.round(amount)) + ' ₽';
        }

        // Инициализация при загрузке
        renderCategories();
        renderBonusCategories();
        renderFreeCategories();
        loadFromStorage();
        
        Telegram.WebApp.onEvent('viewportChanged', saveToStorage);
        Telegram.WebApp.onEvent('closing', saveToStorage);
    </script>
</body>
</html>
